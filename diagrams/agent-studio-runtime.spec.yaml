edges:
  - from: external_sys
    to: msg_hub
    type: primary
    label: 外部事件
    style:
      strokeColor: '#2563EB'
      strokeWidth: 2.5
      endArrow: block
  - from: msg_hub
    to: event_bus
    type: primary
    style:
      strokeColor: '#2563EB'
      strokeWidth: 2.5
      endArrow: block
  - from: ws_conn
    to: worker
    type: primary
    label: 调度
    style:
      strokeColor: '#1E293B'
      strokeWidth: 2
  - from: http_gw
    to: worker
    type: primary
    label: 外部事件
    style:
      strokeColor: '#1E293B'
      strokeWidth: 2
  - from: supervisor
    to: worker
    type: primary
    style:
      strokeColor: '#1E293B'
      strokeWidth: 2
      dashed: true
      dashPattern: 4 4
  - from: worker
    to: world_header
    type: primary
    style:
      strokeColor: '#1E293B'
      strokeWidth: 2
  - from: msg_hub
    to: world_header
    type: primary
    style:
      strokeColor: '#1E293B'
      strokeWidth: 2
  - from: event_bus
    to: scene_shared
    type: primary
    label: scope=scene
    style:
      strokeColor: '#1E293B'
      strokeWidth: 2.5
  - from: event_bus
    to: scene_isolated
    type: primary
    label: scope=scene
    style:
      strokeColor: '#1E293B'
      strokeWidth: 2.5
  - from: event_bus
    to: instance
    type: primary
    label: scope=world
    style:
      strokeColor: '#1E293B'
      strokeWidth: 2.5
  - from: event_bus
    to: alarm_mgr
    type: primary
    style:
      strokeColor: '#1E293B'
      strokeWidth: 2.5
  - from: instance
    to: sandbox
    type: primary
    label: 执行 behavior
    style:
      strokeColor: '#1E293B'
      strokeWidth: 2
  - from: sandbox
    to: event_bus
    type: primary
    label: 产生新事件
    style:
      strokeColor: '#1E293B'
      strokeWidth: 2
  - from: scene_shared
    to: instance
    type: optional
    label: 共享已有实例
    style:
      strokeColor: '#1E293B'
      strokeWidth: 1.5
  - from: scene_isolated
    to: instance
    type: optional
    label: COW 副本
    style:
      strokeColor: '#1E293B'
      strokeWidth: 1.5
  - from: model
    to: instance
    type: dependency
    label: 定义 behaviors
    style:
      strokeColor: '#1E293B'
      strokeWidth: 1.5
  - from: instance
    to: sqlite_db
    type: data
    label: 状态持久化
    style:
      strokeColor: '#64748B'
      strokeWidth: 1.5
      dashed: true
      dashPattern: 6 4
  - from: state_mgr
    to: sqlite_db
    type: data
    label: Checkpoint
    style:
      strokeColor: '#64748B'
      strokeWidth: 1.5
      dashed: true
      dashPattern: 6 4
  - from: sqlite_db
    to: state_mgr
    type: data
    label: Restore / Replay
    style:
      strokeColor: '#64748B'
      strokeWidth: 1.5
      dashed: true
      dashPattern: 6 4
modules: []
